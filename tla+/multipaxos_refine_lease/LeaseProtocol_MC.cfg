SPECIFICATION Spec

CONSTANTS
    Replicas = {s1, s2, s3}
    MaxBallot <- ConstMaxBallot
    TGuard <- ConstTGuard
    TLease <- ConstTLease
    MaxTime <- ConstMaxTime

SYMMETRY SymmetricPerms

INVARIANTS
    TypeOK
    LeaseExpirationSafety

CHECK_DEADLOCK FALSE
    \* Leasing is supposed to be a background protocol that is allowed to
    \* stutter while not terminating, so don't check "deadlocks"
