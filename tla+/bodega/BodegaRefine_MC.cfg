SYMMETRY SymmetricPerms

INVARIANTS
    FullTypeOK
    LeaseExpirationSafety
    AtMostOneGrantPerNode
    AtMostOneStableRoster
    GrantsEqualsActive

PROPERTIES
    RefinesBodega

CHECK_DEADLOCK TRUE
